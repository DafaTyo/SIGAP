openapi: 3.1.0
info:
  title: SIGAP API Contract
  version: 1.0.1
  description: |
    Kontrak API untuk platform vendor‑governance SIGAP.  
    Memuat kebijakan **PII masking**, **mandatory idempotency**, **geospatial radius tolerance**, **photo‑metadata**, **appeal / freeze status**, dan **real‑time streaming** untuk proses dokumen.
servers:
  - url: https://api.sigap.id/v1
    description: Production server
security:
  - bearerAuth: []
paths:
  /vendors:
    get:
      summary: Daftar vendor (view publik)
      description: Mengembalikan data vendor yang dapat dilihat oleh semua user. NIK selalu **masked**.
      responses:
        '200':
          description: List of public vendors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/VendorPublic'
  /vendors/{vendor_id}:
    get:
      summary: Detail vendor (admin view)
      description: Hanya dapat diakses oleh role **ADMIN** atau **AUDITOR**. Menyertakan NIK terenkripsi dan status appeal.
      parameters:
        - name: vendor_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Vendor detail (admin)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VendorAdmin'
        '403':
          description: Akses ditolak
    patch:
      summary: Update vendor (admin)
      description: |
        Memperbarui data vendor. **Header `X-Idempotency-Key` wajib** (UUID‑v4).  
        Operasi diblokir bila `appeal_status` berada pada status *PENDING_REVIEW* atau *UNDER_REVIEW* (freeze).
      parameters:
        - name: vendor_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: X-Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            format: uuid
            description: Kunci idempotensi unik per request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VendorUpdate'
      responses:
        '200':
          description: Vendor berhasil di‑update
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VendorAdmin'
        '409':
          description: Konflik idempotency atau vendor dalam status freeze
        '403':
          description: Akses tidak diizinkan
  /distributions/report:
    post:
      summary: Submit distribution report
      description: |
        - Memuat koordinat (lat,lng) dan **photo_taken_at** (timestamp EXIF).  
        - Validasi radius menggunakan **toleransi 50 m ±10 %**; bila di luar toleransi flag `radius_warning`.
      parameters:
        - name: X-Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            format: uuid
            description: Mencegah duplikasi submission pada jaringan lag
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DistributionReport'
      responses:
        '201':
          description: Report berhasil disimpan; anomaly detection berjalan asinkron
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DistributionResponse'
        '400':
          description: Validasi gagal (mis‑radius, foto, dll.)
  /documents/stream/{ticket_id}:
    get:
      summary: Stream status pemrosesan dokumen (SSE)
      description: |
        Endpoint ini mengirim **Server‑Sent Events** dengan progres asinkron (upload, OCR, validasi).  
        Menghindari polling berulang dan mengurangi risiko DDoS.
      parameters:
        - name: ticket_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
            description: ID tiket proses dokumen
      responses:
        '200':
          description: Event stream
          content:
            text/event-stream:
              schema:
                type: string
        '404':
          description: Ticket tidak ditemukan
components:
  schemas:
    VendorPublic:
      type: object
      description: Data vendor yang dapat dilihat publik (NIK sudah masked)
      required:
        - id
        - name
        - nik_masked
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        nik_masked:
          type: string
          example: "3175********1234"
    VendorAdmin:
      type: object
      description: Data vendor untuk admin / auditor (mengandung NIK terenkripsi)
      required:
        - id
        - nik_encrypted
        - appeal_status
      properties:
        id:
          type: string
          format: uuid
        nik_encrypted:
          type: string
          description: Encrypted NIK (BYTEA) – tidak pernah dikirim ke client publik
        appeal_status:
          type: string
          enum:
            - ACTIVE
            - PENDING_REVIEW
            - UNDER_REVIEW
            - RESOLVED
            - REJECTED
            - APPEALED
          description: Status review vendor; bila tidak `ACTIVE`, semua mutasi **freeze**.
        additional_info:
          type: object
          additionalProperties: true
    VendorUpdate:
      type: object
      description: Payload untuk memperbarui data vendor (admin)
      properties:
        name:
          type: string
        nik_plain:
          type: string
          description: NIK dalam plain‑text **hanya** diterima oleh service yang melakukan enkripsi sebelum menyimpan.
      additionalProperties: false
    DistributionReport:
      type: object
      required:
        - location
        - photo_taken_at
      properties:
        location:
          type: object
          required:
            - lat
            - lng
          properties:
            lat:
              type: number
              format: double
            lng:
              type: number
              format: double
            radius:
              type: number
              description: "Radius (meter) yang dilaporkan oleh perangkat pengirim"
        photo_taken_at:
          type: string
          format: date-time
          description: Timestamp EXIF foto (waktu pengambilan sebenarnya)
        photo_url:
          type: string
          format: uri
          description: URL foto yang di‑upload
        notes:
          type: string
        vendor_id:
          type: string
          format: uuid
    DistributionResponse:
      type: object
      properties:
        report_id:
          type: string
          format: uuid
        status:
          type: string
          enum:
            - RECEIVED
            - VALIDATING
            - COMPLETED
            - REJECTED
        radius_warning:
          type: boolean
          description: True bila radius di luar toleransi 50 m ±10 %
        tampering_flag:
          type: boolean
          description: True bila `photo_taken_at` tidak konsisten dengan `created_at`
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT